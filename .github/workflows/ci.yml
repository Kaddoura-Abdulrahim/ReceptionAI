name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: go test ./...
      - run: go build -buildvcs=false ./...
      - run: npm run build:web

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: docker build -f apps/api/Dockerfile -t dentaldesk-api:ci .
      - run: docker build -f apps/worker/Dockerfile -t dentaldesk-worker:ci .
      - run: docker build -f apps/web/Dockerfile -t dentaldesk-web:ci .
