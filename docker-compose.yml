services:
  postgres:
    image: postgres:17-alpine
    container_name: dentaldesk-postgres
    environment:
      POSTGRES_DB: dentaldesk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - dentaldesk_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dentaldesk"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dentaldesk_postgres_data:
