services:
  - name: dentaldesk-api
    type: web
    runtime: docker
    plan: free
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    preDeployCommand: /app/migrate
    healthCheckPath: /healthz
    envVars:
      - key: APP_ENV
        value: production
      - key: STORE_DRIVER
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: dentaldesk-db
          property: connectionString
      - key: APP_BASE_URL
        value: https://dentaldesk-web.onrender.com
      - key: API_BASE_URL
        value: https://dentaldesk-api.onrender.com
      - key: SESSION_SECRET
        generateValue: true
      - key: CALENDAR_TOKEN_SECRET
        generateValue: true
      - key: VAPI_WEBHOOK_SECRET
        generateValue: true
      - key: WORKER_TOKEN
        generateValue: true
      - key: LOG_LEVEL
        value: info
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_SECURE
        value: tls
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: DentalDesk AI
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URL
        value: https://dentaldesk-api.onrender.com/v1/calendar/oauth/callback
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false

  - name: dentaldesk-web
    type: web
    runtime: docker
    plan: free
    dockerfilePath: apps/web/Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://dentaldesk-api.onrender.com

databases:
  - name: dentaldesk-db
    plan: free
    databaseName: dentaldesk
    user: dentaldesk
    postgresMajorVersion: "17"
